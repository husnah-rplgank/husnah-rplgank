name: Generate Kakyoin Contributions Animation

on:
  # Berjalan otomatis setiap 12 jam
  schedule:
    - cron: "0 */12 * * *"
  
  # Mengizinkan kamu untuk menjalankan ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali kamu update README
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user contributions graph
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#b80d2a&color_dots=#0d1117,#133a24,#1c5d39,#026e3d,#42b883
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#b80d2a&color_dots=#0d1117,#133a24,#1c5d39,#026e3d,#42b883

      # Push file hasil generate ke branch output agar bisa dipanggil di README
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
